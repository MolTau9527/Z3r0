name: Sync upstream and publish Docker images

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions: {}

concurrency:
  group: z3r0-sync-build-publish
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: yv1ing/Z3r0
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  sync:
    name: Sync upstream safely
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      version: ${{ steps.source.outputs.version }}
      should_build: ${{ steps.source.outputs.should_build }}

    steps:
      - name: Checkout fork main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream main
        id: source
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --prune upstream main

          previous_sha="$(git rev-parse HEAD)"

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork already contains upstream/main"
          else
            # Keep this fork's trusted automation. Upstream workflow files are
            # intentionally not imported into a repository that owns secrets.
            if git merge --no-commit --no-ff upstream/main; then
              merge_status=0
            else
              merge_status=$?
            fi

            git restore --source="${previous_sha}" --staged --worktree -- .github
            git add -A .github

            unresolved="$(git diff --name-only --diff-filter=U)"
            if [[ -n "${unresolved}" ]]; then
              echo "Upstream merge has conflicts outside the protected .github directory:"
              printf '%s\n' "${unresolved}"
              git merge --abort
              exit "${merge_status:-1}"
            fi

            git commit -m "Sync upstream yv1ing/Z3r0"
            git push origin HEAD:main
          fi

          source_sha="$(git rev-parse HEAD)"
          version="$(jq -r '.version // empty' web/package.json)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid or missing version in web/package.json: ${version}"
            exit 1
          fi

          last_delivered_source=""
          if git fetch --no-tags origin "+delivery:refs/remotes/origin/delivery" 2>/dev/null; then
            last_delivered_source="$(
              git log -1 --format=%B origin/delivery |
                sed -n 's/^Source-SHA: //p' |
                tail -n 1
            )"
            # Compatibility with delivery commits created before Source-SHA
            # was recorded in the commit message.
            if [[ -z "${last_delivered_source}" ]]; then
              last_delivered_source="$(git rev-parse 'origin/delivery^1' 2>/dev/null || true)"
            fi
          fi

          should_build="true"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" && "${source_sha}" == "${last_delivered_source}" ]]; then
            should_build="false"
            echo "Source ${source_sha} is already published; skipping scheduled rebuild."
          fi

          {
            echo "source_sha=${source_sha}"
            echo "version=${version}"
            echo "should_build=${should_build}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.image }}
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: z3r0
            context: .
            dockerfile: ./Dockerfile
            cache_scope: z3r0-app
          - image: sandbox-runtime
            context: ./sandbox
            dockerfile: ./sandbox/Dockerfile
            cache_scope: sandbox-runtime

    steps:
      - name: Validate Docker Hub configuration
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_NAMESPACE}" ]]; then
            echo "Missing repository variable: DOCKERHUB_USERNAME"
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "Missing repository secret: DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Checkout synchronized source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.sync.outputs.source_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push versioned image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ needs.sync.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.sync.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.sync.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  promote:
    name: Promote versioned images to latest
    needs:
      - sync
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote both images
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          for image in z3r0 sandbox-runtime; do
            source_image="${DOCKERHUB_NAMESPACE}/${image}:${VERSION}"
            latest_image="${DOCKERHUB_NAMESPACE}/${image}:latest"
            docker buildx imagetools create --tag "${latest_image}" "${source_image}"
          done

  delivery:
    name: Generate delivery branch
    needs:
      - sync
      - promote
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate deployment files
        env:
          VERSION: ${{ needs.sync.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          cat > docker-compose.yaml <<'COMPOSE'
          name: z3r0

          # Published Z3r0 version: __VERSION__
          # Register this image in Z3r0's Sandbox Images page:
          # __SANDBOX_IMAGE__

          services:
            app:
              image: __APP_IMAGE__
              container_name: z3r0-app
              restart: unless-stopped
              network_mode: host
              depends_on:
                postgres:
                  condition: service_healthy
              volumes:
                - ./.z3r0:/app/.z3r0
                - ./.lightrag:/app/.lightrag
                # Z3r0 needs Docker API access to start sandbox containers.
                # Treat this mount as equivalent to host-root access.
                - /var/run/docker.sock:/var/run/docker.sock

            postgres:
              image: ghcr.io/yv1ing/postgres-for-rag:latest
              container_name: z3r0-postgres
              restart: unless-stopped
              # Keep these values aligned with database in .z3r0/config.json.
              environment:
                POSTGRES_USER: root
                POSTGRES_PASSWORD: 123456
                POSTGRES_DB: z3r0
              ports:
                - "127.0.0.1:5432:5432"
              volumes:
                # PostgreSQL 18+ stores data in major-version subdirectories.
                - ./.postgres-data:/var/lib/postgresql
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
                interval: 5s
                timeout: 5s
                retries: 20

            pgadmin:
              image: ghcr.io/yv1ing/pgadmin4:latest
              container_name: z3r0-pgadmin
              restart: unless-stopped
              environment:
                PGADMIN_DEFAULT_EMAIL: me@yvling.cn
                PGADMIN_DEFAULT_PASSWORD: 123456
                PGADMIN_LISTEN_PORT: 5433
              ports:
                - "127.0.0.1:5433:5433"
              volumes:
                - ./.pgadmin-data:/var/lib/pgadmin
              depends_on:
                postgres:
                  condition: service_healthy
          COMPOSE

          app_image="${DOCKERHUB_NAMESPACE}/z3r0:latest"
          sandbox_image="${DOCKERHUB_NAMESPACE}/sandbox-runtime:latest"
          sed -i "s|__APP_IMAGE__|${app_image}|g" docker-compose.yaml
          sed -i "s|__SANDBOX_IMAGE__|${sandbox_image}|g" docker-compose.yaml
          sed -i "s|__VERSION__|${VERSION}|g" docker-compose.yaml

      - name: Publish deployment file atomically to delivery branch
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.sync.outputs.source_sha }}
          VERSION: ${{ needs.sync.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          create_blob() {
            local path="$1"
            local encoded
            encoded="$(base64 -w 0 "${path}")"
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/blobs" \
              -f content="${encoded}" \
              -f encoding="base64" \
              --jq '.sha'
          }

          compose_blob="$(create_blob docker-compose.yaml)"

          delivery_parent=""
          if delivery_ref="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/delivery" 2>/dev/null
          )"; then
            delivery_parent="$(jq -r '.object.sha' <<< "${delivery_ref}")"
          fi
          commit_parent="${delivery_parent:-${SOURCE_SHA}}"

          tree_sha="$(
            jq -n \
              --arg base_tree "${SOURCE_SHA}" \
              --arg compose_blob "${compose_blob}" \
              '{
                base_tree: $base_tree,
                tree: [
                  {path: "docker-compose.yaml", mode: "100644", type: "blob", sha: $compose_blob}
                ]
              }' |
              gh api \
                --method POST \
                "repos/${GITHUB_REPOSITORY}/git/trees" \
                --input - \
                --jq '.sha'
          )"

          delivery_commit="$(
            jq -n \
              --arg message "Generate latest deployment for ${VERSION}\n\nSource-SHA: ${SOURCE_SHA}" \
              --arg tree "${tree_sha}" \
              --arg parent "${commit_parent}" \
              '{message: $message, tree: $tree, parents: [$parent]}' |
              gh api \
                --method POST \
                "repos/${GITHUB_REPOSITORY}/git/commits" \
                --input - \
                --jq '.sha'
          )"

          if [[ -n "${delivery_parent}" ]]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/delivery" \
              -f sha="${delivery_commit}" >/dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/heads/delivery" \
              -f sha="${delivery_commit}" >/dev/null
          fi
